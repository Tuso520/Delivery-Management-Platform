services:
  mysql:
    image: mysql:8.0
    container_name: delivery-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_USER_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "--protocol=tcp",
          "-uroot",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      timeout: 20s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
    networks:
      - delivery-network

  redis:
    image: redis:7-alpine
    container_name: delivery-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - delivery-network

  minio:
    image: ${MINIO_IMAGE:-quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z}
    container_name: delivery-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - delivery-network

  minio-init:
    image: ${MINIO_MC_IMAGE:-quay.io/minio/mc:RELEASE.2025-07-21T05-28-08Z}
    container_name: delivery-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -ec "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${MINIO_BUCKET};
      echo 'MinIO bucket initialized';
      "
    networks:
      - delivery-network

  backend:
    build:
      context: ./delivery-platform-server
      dockerfile: Dockerfile
      args:
        RELEASE_ID: ${RELEASE_ID:-development}
    image: delivery-platform-backend:${RELEASE_ID:-development}
    container_name: delivery-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_USER_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - INTEGRATION_SECRET_ENCRYPTION_KEY=${INTEGRATION_SECRET_ENCRYPTION_KEY:?INTEGRATION_SECRET_ENCRYPTION_KEY is required}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - ONLYOFFICE_DOCS_URL=${ONLYOFFICE_DOCS_URL:-}
      - ONLYOFFICE_JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8080}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      backend-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - delivery-network

  file-worker:
    image: delivery-platform-backend:${RELEASE_ID:-development}
    container_name: delivery-file-worker
    restart: unless-stopped
    init: true
    stop_grace_period: 330s
    command: ["node", "dist/workers/file-processing.worker"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_USER_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - FILE_CONVERTER_URL=${FILE_CONVERTER_URL:-}
      - FILE_CONVERTER_TOKEN=${FILE_CONVERTER_TOKEN:-}
      - FILE_CONVERTER_TIMEOUT_MS=${FILE_CONVERTER_TIMEOUT_MS:-120000}
      - FILE_CONVERTER_MAX_OUTPUT_BYTES=${FILE_CONVERTER_MAX_OUTPUT_BYTES:-209715200}
      - FILE_PROCESSING_MAX_ATTEMPTS=${FILE_PROCESSING_MAX_ATTEMPTS:-3}
      - FILE_PROCESSING_LEASE_MS=${FILE_PROCESSING_LEASE_MS:-300000}
      - FILE_PROCESSING_RETRY_BASE_MS=${FILE_PROCESSING_RETRY_BASE_MS:-5000}
      - FILE_PROCESSING_RETRY_MAX_MS=${FILE_PROCESSING_RETRY_MAX_MS:-900000}
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
      backend-migrate:
        condition: service_completed_successfully
    networks:
      - delivery-network

  outbox-worker:
    image: delivery-platform-backend:${RELEASE_ID:-development}
    container_name: delivery-outbox-worker
    restart: unless-stopped
    init: true
    stop_grace_period: 75s
    command: ["node", "dist/workers/outbox-dispatch.worker"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_USER_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      - INTEGRATION_SECRET_ENCRYPTION_KEY=${INTEGRATION_SECRET_ENCRYPTION_KEY:?INTEGRATION_SECRET_ENCRYPTION_KEY is required}
    depends_on:
      mysql:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully
    networks:
      - delivery-network

  backend-migrate:
    build:
      context: ./delivery-platform-server
      dockerfile: Dockerfile
      target: builder
      args:
        RELEASE_ID: ${RELEASE_ID:-development}
    container_name: delivery-backend-migrate
    restart: "no"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_USER_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      - INTEGRATION_SECRET_ENCRYPTION_KEY=${INTEGRATION_SECRET_ENCRYPTION_KEY:?INTEGRATION_SECRET_ENCRYPTION_KEY is required}
      - INTEGRATION_SECRET_MIGRATION_ACTOR_USERNAME=${INTEGRATION_SECRET_MIGRATION_ACTOR_USERNAME:-admin}
      - SEED_RESET_EXISTING_USER_PASSWORDS=${SEED_RESET_EXISTING_USER_PASSWORDS:-false}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD}
      - SEED_DEFAULT_PASSWORD=${SEED_DEFAULT_PASSWORD}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_USE_SSL=false
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "node prisma/prepare-migrate.js && ./node_modules/.bin/prisma migrate deploy && ./node_modules/.bin/ts-node --transpile-only prisma/seed.ts && ./node_modules/.bin/ts-node --transpile-only prisma/migrate-integration-secrets.ts && ./node_modules/.bin/ts-node --transpile-only prisma/migrate-integration-secrets.ts --apply --actor-username=$${INTEGRATION_SECRET_MIGRATION_ACTOR_USERNAME} && ./node_modules/.bin/ts-node --transpile-only prisma/seed.ts && ./node_modules/.bin/ts-node --transpile-only prisma/migrate-integration-secrets.ts --verify"
    networks:
      - delivery-network

  frontend:
    build:
      context: ./delivery-platform-web
      dockerfile: Dockerfile
      args:
        RELEASE_ID: ${RELEASE_ID:-development}
    image: delivery-platform-frontend:${RELEASE_ID:-development}
    container_name: delivery-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - delivery-network

volumes:
  mysql_data:
  redis_data:
  minio_data:

networks:
  delivery-network:
    driver: bridge
