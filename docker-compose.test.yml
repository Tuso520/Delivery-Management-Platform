name: delivery-platform-local

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_USER_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${MYSQL_PORT:-13306}:3306"
    volumes:
      - mysql_test_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "--protocol=tcp",
          "-uroot",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 20s
      retries: 15
      start_period: 30s
    networks:
      - delivery-local-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-16379}:6379"
    volumes:
      - redis_test_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - delivery-local-network

  minio:
    image: ${MINIO_IMAGE:-quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z}
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-19000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio_test_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - delivery-local-network

  minio-init:
    image: ${MINIO_MC_IMAGE:-quay.io/minio/mc:RELEASE.2025-07-21T05-28-08Z}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -ec "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${MINIO_BUCKET};
      echo 'MinIO bucket initialized';
      "
    networks:
      - delivery-local-network

  backend-migrate:
    build:
      context: ./delivery-platform-server
      dockerfile: Dockerfile
      target: builder
      args:
        RELEASE_ID: ${RELEASE_ID:-local-test}
    image: delivery-platform-backend-migrate:test-${RELEASE_ID:-local}
    restart: "no"
    environment:
      NODE_ENV: development
      EXPECTED_MIGRATION_COUNT: ${EXPECTED_MIGRATION_COUNT:-30}
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_USER_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?SEED_ADMIN_PASSWORD is required}
      SEED_DEFAULT_PASSWORD: ${SEED_DEFAULT_PASSWORD:?SEED_DEFAULT_PASSWORD is required}
      SEED_RESET_EXISTING_USER_PASSWORDS: ${SEED_RESET_EXISTING_USER_PASSWORDS:-false}
      INTEGRATION_SECRET_ENCRYPTION_KEY: ${INTEGRATION_SECRET_ENCRYPTION_KEY:?INTEGRATION_SECRET_ENCRYPTION_KEY is required}
      INTEGRATION_SECRET_MIGRATION_ACTOR_USERNAME: ${INTEGRATION_SECRET_MIGRATION_ACTOR_USERNAME:-admin}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    depends_on:
      mysql:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: ["sh", "prisma/run-deployment-migrations.sh"]
    networks:
      - delivery-local-network

  backend:
    build:
      context: ./delivery-platform-server
      dockerfile: Dockerfile
      args:
        RELEASE_ID: ${RELEASE_ID:-local-test}
    image: delivery-platform-backend:test-${RELEASE_ID:-local}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT:-13000}:3000"
    environment:
      NODE_ENV: test
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_USER_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      INTEGRATION_SECRET_ENCRYPTION_KEY: ${INTEGRATION_SECRET_ENCRYPTION_KEY:?INTEGRATION_SECRET_ENCRYPTION_KEY is required}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://delivery-platform.localhost:18080}
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      backend-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    networks:
      - delivery-local-network

  file-worker:
    image: delivery-platform-backend:test-${RELEASE_ID:-local}
    restart: unless-stopped
    init: true
    stop_grace_period: 330s
    command: ["node", "dist/workers/file-processing.worker"]
    environment:
      NODE_ENV: test
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_USER_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      FILE_CONVERTER_URL: ${FILE_CONVERTER_URL:-}
      FILE_CONVERTER_TOKEN: ${FILE_CONVERTER_TOKEN:-}
      FILE_CONVERTER_TIMEOUT_MS: ${FILE_CONVERTER_TIMEOUT_MS:-120000}
      FILE_CONVERTER_MAX_OUTPUT_BYTES: ${FILE_CONVERTER_MAX_OUTPUT_BYTES:-209715200}
      FILE_PROCESSING_MAX_ATTEMPTS: ${FILE_PROCESSING_MAX_ATTEMPTS:-3}
      FILE_PROCESSING_LEASE_MS: ${FILE_PROCESSING_LEASE_MS:-300000}
      FILE_PROCESSING_RETRY_BASE_MS: ${FILE_PROCESSING_RETRY_BASE_MS:-5000}
      FILE_PROCESSING_RETRY_MAX_MS: ${FILE_PROCESSING_RETRY_MAX_MS:-900000}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      backend-migrate:
        condition: service_completed_successfully
    networks:
      - delivery-local-network

  outbox-worker:
    image: delivery-platform-backend:test-${RELEASE_ID:-local}
    restart: unless-stopped
    init: true
    stop_grace_period: 75s
    command: ["node", "dist/workers/outbox-dispatch.worker"]
    environment:
      NODE_ENV: test
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_USER_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      INTEGRATION_SECRET_ENCRYPTION_KEY: ${INTEGRATION_SECRET_ENCRYPTION_KEY:?INTEGRATION_SECRET_ENCRYPTION_KEY is required}
    depends_on:
      mysql:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully
    networks:
      - delivery-local-network

  frontend:
    build:
      context: ./delivery-platform-web
      dockerfile: Dockerfile
      args:
        RELEASE_ID: ${RELEASE_ID:-local-test}
    image: delivery-platform-frontend:test-${RELEASE_ID:-local}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-18080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/health",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - delivery-local-network

volumes:
  mysql_test_data:
  redis_test_data:
  minio_test_data:

networks:
  delivery-local-network:
    driver: bridge
