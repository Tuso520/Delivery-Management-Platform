name: test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
      - name: Backend install
        working-directory: delivery-platform-server
        run: pnpm install --frozen-lockfile
      - name: Backend type-check
        working-directory: delivery-platform-server
        run: pnpm prisma:generate && pnpm type-check
      - name: Backend tests
        working-directory: delivery-platform-server
        run: pnpm test -- --runInBand
      - name: Backend build
        working-directory: delivery-platform-server
        run: pnpm build
      - name: Frontend install
        working-directory: delivery-platform-web
        run: pnpm install --frozen-lockfile
      - name: Frontend type-check
        working-directory: delivery-platform-web
        run: pnpm type-check
      - name: Frontend tests
        working-directory: delivery-platform-web
        run: pnpm test
      - name: Frontend build
        working-directory: delivery-platform-web
        run: pnpm build
      - name: Compose config
        run: docker compose --env-file .env.local.example -f docker-compose.test.yml config -q
