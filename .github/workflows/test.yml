name: 质量检查

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  quality:
    name: 前后端质量检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
      - name: 安装后端依赖
        working-directory: delivery-platform-server
        run: pnpm install --frozen-lockfile
      - name: 后端代码检查
        working-directory: delivery-platform-server
        run: pnpm lint && git diff --exit-code
      - name: 后端类型检查
        working-directory: delivery-platform-server
        run: pnpm prisma:generate && pnpm type-check
      - name: 后端测试
        working-directory: delivery-platform-server
        run: pnpm test --runInBand
      - name: 后端构建
        working-directory: delivery-platform-server
        run: pnpm build
      - name: 安装前端依赖
        working-directory: delivery-platform-web
        run: pnpm install --frozen-lockfile
      - name: 前端代码检查
        working-directory: delivery-platform-web
        run: pnpm lint && git diff --exit-code
      - name: 前端类型检查
        working-directory: delivery-platform-web
        run: pnpm type-check
      - name: 前端测试
        working-directory: delivery-platform-web
        run: pnpm test
      - name: 前端构建
        working-directory: delivery-platform-web
        run: pnpm build
      - name: Docker Compose 配置检查
        run: docker compose --env-file .env.local.example -f docker-compose.test.yml config -q
