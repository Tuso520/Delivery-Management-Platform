name: 部署校验

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 部署目标环境
        required: true
        default: test
        type: choice
        options:
          - test
          - production

jobs:
  package:
    name: 部署配置校验
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 校验 Compose 配置
        run: |
          docker compose --env-file .env.local.example -f docker-compose.test.yml config -q
          docker compose --env-file .env.example -f docker-compose.prod.yml config -q
      - name: 校验 Git 部署脚本
        run: bash -n deploy-git.sh
      - name: 输出部署交接说明
        run: |
          echo "推送或打标签后，在目标服务器执行 deploy-git.sh。"
          echo "服务器本地保留 .env、备份目录和 Docker 命名卷，不从 Git 覆盖。"
