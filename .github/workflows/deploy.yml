name: 部署

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 可选 main 上的 Git ref、tag 或 commit SHA；留空时部署 main
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: deploy-test
  cancel-in-progress: false

jobs:
  quality:
    name: 部署前质量门禁
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.sha }}
          fetch-depth: 0
      - name: 限制手动部署版本
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main || {
            echo "::error::仅允许部署 main 历史中的提交或标签"
            exit 1
          }
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
      - name: 安装后端依赖
        working-directory: delivery-platform-server
        run: pnpm install --frozen-lockfile
      - name: 后端代码检查
        working-directory: delivery-platform-server
        run: pnpm lint && git diff --exit-code
      - name: 后端类型检查
        working-directory: delivery-platform-server
        run: pnpm prisma:generate && pnpm type-check
      - name: 后端测试
        working-directory: delivery-platform-server
        run: pnpm test --runInBand
      - name: 后端构建
        working-directory: delivery-platform-server
        run: pnpm build
      - name: 安装前端依赖
        working-directory: delivery-platform-web
        run: pnpm install --frozen-lockfile
      - name: 前端代码检查
        working-directory: delivery-platform-web
        run: pnpm lint && git diff --exit-code
      - name: 前端类型检查
        working-directory: delivery-platform-web
        run: pnpm type-check
      - name: 前端测试
        working-directory: delivery-platform-web
        run: pnpm test
      - name: 前端构建
        working-directory: delivery-platform-web
        run: pnpm build

  validate:
    name: 部署配置校验
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.sha }}
          fetch-depth: 0
      - name: 校验 Compose 配置
        run: |
          docker compose --env-file .env.local.example -f docker-compose.test.yml config -q
          docker compose --env-file .env.example -f docker-compose.yml config -q
          docker compose --env-file .env.example -f docker-compose.yml -f docker-compose.prod.yml config -q
      - name: 校验 Git 部署脚本
        run: |
          bash -n deploy-git.sh
          bash scripts/test-deploy-git.sh

  integration:
    name: 真实依赖与核心 E2E
    runs-on: ubuntu-latest
    env:
      COMPOSE_PROJECT_NAME: delivery-platform-ci
      MYSQL_DATABASE: delivery_platform
      MYSQL_USER: delivery_user
      MINIO_ROOT_USER: delivery_minio
      MINIO_BUCKET: delivery-platform
      INTEGRATION_SECRET_MIGRATION_ACTOR_USERNAME: admin
      SEED_RESET_EXISTING_USER_PASSWORDS: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.sha }}
          fetch-depth: 0
      - name: 固定真实验收提交
        run: |
          resolved_ref="$(git rev-parse HEAD)"
          printf 'RELEASE_ID=ci-%s\n' "$resolved_ref" >> "$GITHUB_ENV"
      - name: 生成隔离验收凭据
        run: |
          set_secret() {
            name="$1"
            value="$2"
            echo "::add-mask::$value"
            printf '%s=%s\n' "$name" "$value" >> "$GITHUB_ENV"
          }
          set_secret MYSQL_ROOT_PASSWORD "$(openssl rand -hex 24)"
          set_secret MYSQL_USER_PASSWORD "$(openssl rand -hex 24)"
          set_secret REDIS_PASSWORD "$(openssl rand -hex 24)"
          set_secret MINIO_ROOT_PASSWORD "$(openssl rand -hex 24)"
          set_secret JWT_SECRET "$(openssl rand -base64 48 | tr -d '\r\n')"
          set_secret INTEGRATION_SECRET_ENCRYPTION_KEY "$(openssl rand -base64 32 | tr -d '\r\n')"
          set_secret SEED_ADMIN_PASSWORD "$(openssl rand -base64 24 | tr -d '\r\n')"
          set_secret SEED_DEFAULT_PASSWORD "$(openssl rand -base64 24 | tr -d '\r\n')"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
      - name: 安装真实验收依赖
        run: |
          pnpm --dir delivery-platform-server install --frozen-lockfile
          pnpm --dir delivery-platform-web install --frozen-lockfile
          pnpm --dir delivery-platform-web exec playwright install --with-deps chrome
      - name: 启动真实依赖与应用
        run: |
          docker compose --env-file .env.local.example -f docker-compose.test.yml up -d --build
          for _ in $(seq 1 60); do
            if curl -fsS --connect-timeout 3 --max-time 10 http://127.0.0.1:13000/api/v1/ready >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose --env-file .env.local.example -f docker-compose.test.yml ps
          exit 1
      - name: 验证异步 Worker 稳定
        run: |
          compose=(docker compose --env-file .env.local.example -f docker-compose.test.yml)
          for service in file-worker outbox-worker; do
            stable=0
            for _ in $(seq 1 20); do
              container_id="$("${compose[@]}" ps --status running --quiet "$service" 2>/dev/null || true)"
              if [ -n "$container_id" ]; then
                initial_restarts="$(docker inspect "$container_id" --format '{{.RestartCount}}' 2>/dev/null || true)"
                sleep 5
                stable_container_id="$("${compose[@]}" ps --status running --quiet "$service" 2>/dev/null || true)"
                final_restarts="$(docker inspect "$container_id" --format '{{.RestartCount}}' 2>/dev/null || true)"
                if [ "$stable_container_id" = "$container_id" ] &&
                  [ -n "$initial_restarts" ] && [ "$final_restarts" = "$initial_restarts" ]; then
                  stable=1
                  break
                fi
              fi
              sleep 3
            done
            if [ "$stable" -ne 1 ]; then
              echo "::error::$service did not remain stable"
              "${compose[@]}" logs --no-color --tail=200 "$service" || true
              exit 1
            fi
          done
      - name: 真实 NestJS API E2E
        working-directory: delivery-platform-server
        env:
          E2E_API_BASE_URL: http://127.0.0.1:13000/api/v1
          E2E_USERNAME: admin
        run: E2E_PASSWORD="$SEED_ADMIN_PASSWORD" pnpm test:e2e --runInBand
      - name: 真实依赖就绪冒烟
        working-directory: delivery-platform-web
        env:
          PLAYWRIGHT_API_BASE_URL: http://127.0.0.1:13000
        run: pnpm test:smoke:api
      - name: 真实浏览器权限与数据范围 E2E
        working-directory: delivery-platform-web
        env:
          PLAYWRIGHT_WEB_BASE_URL: http://127.0.0.1:18080
          E2E_ADMIN_USERNAME: admin
          E2E_LIMITED_USERNAME: pm_wang
        run: |
          E2E_ADMIN_PASSWORD="$SEED_ADMIN_PASSWORD" \
          E2E_LIMITED_PASSWORD="$SEED_DEFAULT_PASSWORD" \
          pnpm test:e2e
      - name: 输出容器状态
        if: ${{ always() }}
        run: docker compose --env-file .env.local.example -f docker-compose.test.yml ps
      - name: 清理真实验收环境
        if: ${{ always() }}
        run: docker compose --env-file .env.local.example -f docker-compose.test.yml down -v --remove-orphans

  deploy:
    name: 部署到服务器
    needs: [quality, validate, integration]
    runs-on: ubuntu-latest
    environment: test
    env:
      DEPLOY_ENV: test
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.sha }}
      SERVER_HOST: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
      SERVER_USER: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}
      SERVER_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      SERVER_ENV_FILE_B64: ${{ secrets.DEPLOY_ENV_FILE_B64 }}
      SERVER_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      SERVER_PORT: ${{ vars.DEPLOY_PORT || '22' }}
      APP_DIR: ${{ vars.DEPLOY_APP_DIR || '/www/wwwroot/delivery-platform' }}
      BRANCH: main
      COMPOSE_FILES: ${{ vars.DEPLOY_COMPOSE_FILES || 'docker-compose.yml:docker-compose.prod.yml' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: 固定部署提交
        run: echo "DEPLOY_REF=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: 校验部署密钥配置
        run: |
          missing=0
          for name in SERVER_HOST SERVER_USER SERVER_SSH_KEY SERVER_KNOWN_HOSTS; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for environment ${DEPLOY_ENV}"
              missing=1
            fi
          done
          exit "$missing"

      - name: 配置 SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$SERVER_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: 生成当前提交 Git bundle
        run: |
          git bundle create /tmp/delivery-platform-release.bundle HEAD
          git bundle verify /tmp/delivery-platform-release.bundle
          bundled_ref="$(git bundle list-heads /tmp/delivery-platform-release.bundle | awk '$2 == "HEAD" { print $1 }')"
          test "$bundled_ref" = "$DEPLOY_REF"

      - name: 上传当前提交到服务器
        run: |
          remote_bundle="/tmp/delivery-platform-release-${DEPLOY_REF}.bundle"
          remote_script="/tmp/delivery-platform-deploy-${DEPLOY_REF}.sh"
          scp -i ~/.ssh/deploy_key -P "$SERVER_PORT" \
            -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            /tmp/delivery-platform-release.bundle deploy-git.sh \
            "$SERVER_USER@$SERVER_HOST:/tmp/"

          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
            -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "$SERVER_USER@$SERVER_HOST" 'bash -s' -- \
            "$APP_DIR" "$DEPLOY_REF" "$remote_bundle" "$remote_script" <<'REMOTE'
          set -Eeuo pipefail
          APP_DIR="$1"
          DEPLOY_REF="$2"
          REMOTE_BUNDLE="$3"
          REMOTE_SCRIPT="$4"
          umask 077

          test -d "$APP_DIR/.git" || {
            echo "::error::APP_DIR is not an initialized Git repository: $APP_DIR" >&2
            exit 1
          }
          install -d -m 700 "$APP_DIR/.deploy"
          mv -f /tmp/delivery-platform-release.bundle "$REMOTE_BUNDLE"
          mv -f /tmp/deploy-git.sh "$REMOTE_SCRIPT"
          chmod 600 "$REMOTE_BUNDLE"
          chmod 700 "$REMOTE_SCRIPT"

          cleanup_failed_upload() {
            status="$?"
            trap - EXIT
            if [ "$status" -ne 0 ]; then
              rm -f "$REMOTE_BUNDLE" "$REMOTE_SCRIPT"
            fi
            exit "$status"
          }
          trap cleanup_failed_upload EXIT

          # Bundle import, worktree validation and the one-time exact-overlay
          # recovery are performed by deploy-git.sh after it owns the server lock.
          trap - EXIT
          REMOTE

      - name: 执行 Git 拉取部署
        run: |
          local_env=""
          remote_env=""
          env_sha=""
          cleanup_local_env() {
            if [ -n "$local_env" ]; then
              rm -f "$local_env"
            fi
          }
          trap cleanup_local_env EXIT

          if [ -n "$SERVER_ENV_FILE_B64" ]; then
            local_env="$(mktemp)"
            printf '%s' "$SERVER_ENV_FILE_B64" | base64 -d > "$local_env"
            test -s "$local_env"
            chmod 600 "$local_env"
            env_sha="$(sha256sum "$local_env" | awk '{print $1}')"
            remote_env="$APP_DIR/.deploy/env-${DEPLOY_REF}.upload"
            scp -i ~/.ssh/deploy_key -P "$SERVER_PORT" \
              -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
              "$local_env" "$SERVER_USER@$SERVER_HOST:$remote_env"
          fi

          remote_env_arg="${remote_env:-__NOT_SET__}"
          env_sha_arg="${env_sha:-__NOT_SET__}"

          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
            -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "$SERVER_USER@$SERVER_HOST" 'bash -s' -- \
            "$APP_DIR" "$BRANCH" "$COMPOSE_FILES" "$DEPLOY_REF" "$remote_env_arg" "$env_sha_arg" \
            "/tmp/delivery-platform-deploy-${DEPLOY_REF}.sh" \
            "/tmp/delivery-platform-release-${DEPLOY_REF}.bundle" <<'REMOTE'
          set -Eeuo pipefail
          APP_DIR="$1"
          BRANCH="$2"
          COMPOSE_FILES="$3"
          DEPLOY_REF="$4"
          REMOTE_ENV="$5"
          EXPECTED_ENV_SHA="$6"
          DEPLOY_SCRIPT="$7"
          REMOTE_BUNDLE="$8"
          DEPLOY_RUN_ID="${DEPLOY_REF:0:12}-$(date +%s)-$$"
          export DEPLOY_RUN_ID
          if [ "$REMOTE_ENV" = "__NOT_SET__" ]; then
            REMOTE_ENV=""
          fi
          if [ "$EXPECTED_ENV_SHA" = "__NOT_SET__" ]; then
            EXPECTED_ENV_SHA=""
          fi
          umask 077

          cleanup_remote_files() {
            status="$?"
            trap - EXIT
            set +e
            if [ -n "$REMOTE_ENV" ]; then
              rm -f "$REMOTE_ENV"
            fi
            rm -f "$DEPLOY_SCRIPT" "$REMOTE_BUNDLE"
            exit "$status"
          }
          trap cleanup_remote_files EXIT

          cd "$APP_DIR"
          export APP_DIR BRANCH COMPOSE_FILES
          export SKIP_GIT_FETCH=YES
          export DEPLOY_ENV_UPLOAD_PATH="$REMOTE_ENV"
          export DEPLOY_ENV_UPLOAD_SHA256="$EXPECTED_ENV_SHA"
          export DEPLOY_GIT_BUNDLE_PATH="$REMOTE_BUNDLE"
          export ALLOW_RELEASE_OVERLAY_RECOVERY=YES
          if [ -n "$DEPLOY_REF" ]; then
            export REF="$DEPLOY_REF"
          fi

          bash "$DEPLOY_SCRIPT" deploy
          bash "$DEPLOY_SCRIPT" prune-unused-images
          bash "$DEPLOY_SCRIPT" status
          REMOTE
