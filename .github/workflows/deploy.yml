name: 部署

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 可选 main 上的 Git ref、tag 或 commit SHA；留空时部署 main
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: deploy-test
  cancel-in-progress: false

jobs:
  quality:
    name: 部署前质量门禁
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.sha }}
          fetch-depth: 0
      - name: 限制手动部署版本
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main || {
            echo "::error::仅允许部署 main 历史中的提交或标签"
            exit 1
          }
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
      - name: 安装后端依赖
        working-directory: delivery-platform-server
        run: pnpm install --frozen-lockfile
      - name: 后端代码检查
        working-directory: delivery-platform-server
        run: pnpm lint && git diff --exit-code
      - name: 后端类型检查
        working-directory: delivery-platform-server
        run: pnpm prisma:generate && pnpm type-check
      - name: 后端测试
        working-directory: delivery-platform-server
        run: pnpm test --runInBand
      - name: 后端构建
        working-directory: delivery-platform-server
        run: pnpm build
      - name: 安装前端依赖
        working-directory: delivery-platform-web
        run: pnpm install --frozen-lockfile
      - name: 前端代码检查
        working-directory: delivery-platform-web
        run: pnpm lint && git diff --exit-code
      - name: 前端类型检查
        working-directory: delivery-platform-web
        run: pnpm type-check
      - name: 前端测试
        working-directory: delivery-platform-web
        run: pnpm test
      - name: 前端构建
        working-directory: delivery-platform-web
        run: pnpm build

  validate:
    name: 部署配置校验
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 校验 Compose 配置
        run: |
          docker compose --env-file .env.local.example -f docker-compose.test.yml config -q
          docker compose --env-file .env.example -f docker-compose.yml config -q
          docker compose --env-file .env.example -f docker-compose.yml -f docker-compose.prod.yml config -q
      - name: 校验 Git 部署脚本
        run: bash -n deploy-git.sh

  deploy:
    name: 部署到服务器
    needs: [quality, validate]
    runs-on: ubuntu-latest
    environment: test
    env:
      DEPLOY_ENV: test
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.sha }}
      SERVER_HOST: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
      SERVER_USER: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}
      SERVER_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      SERVER_ENV_FILE_B64: ${{ secrets.DEPLOY_ENV_FILE_B64 }}
      SERVER_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      SERVER_PORT: ${{ vars.DEPLOY_PORT || '22' }}
      APP_DIR: ${{ vars.DEPLOY_APP_DIR || '/www/wwwroot/delivery-platform' }}
      BRANCH: main
      COMPOSE_FILES: ${{ vars.DEPLOY_COMPOSE_FILES || 'docker-compose.yml:docker-compose.prod.yml' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: 固定部署提交
        run: echo "DEPLOY_REF=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: 校验部署密钥配置
        run: |
          missing=0
          for name in SERVER_HOST SERVER_USER SERVER_SSH_KEY SERVER_KNOWN_HOSTS; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for environment ${DEPLOY_ENV}"
              missing=1
            fi
          done
          exit "$missing"

      - name: 配置 SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$SERVER_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: 生成当前提交 Git bundle
        run: |
          git bundle create /tmp/delivery-platform-release.bundle HEAD
          git bundle verify /tmp/delivery-platform-release.bundle
          bundled_ref="$(git bundle list-heads /tmp/delivery-platform-release.bundle | awk '$2 == "HEAD" { print $1 }')"
          test "$bundled_ref" = "$DEPLOY_REF"

      - name: 上传当前提交到服务器
        run: |
          remote_bundle="/tmp/delivery-platform-release-${DEPLOY_REF}.bundle"
          remote_script="/tmp/delivery-platform-deploy-${DEPLOY_REF}.sh"
          scp -i ~/.ssh/deploy_key -P "$SERVER_PORT" \
            -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            /tmp/delivery-platform-release.bundle deploy-git.sh \
            "$SERVER_USER@$SERVER_HOST:/tmp/"

          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
            -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "$SERVER_USER@$SERVER_HOST" 'bash -s' -- \
            "$APP_DIR" "$DEPLOY_REF" "$remote_bundle" "$remote_script" <<'REMOTE'
          set -Eeuo pipefail
          APP_DIR="$1"
          DEPLOY_REF="$2"
          REMOTE_BUNDLE="$3"
          REMOTE_SCRIPT="$4"

          test -d "$APP_DIR/.git" || {
            echo "::error::APP_DIR is not an initialized Git repository: $APP_DIR" >&2
            exit 1
          }
          install -d -m 700 "$APP_DIR/.deploy"
          mv -f /tmp/delivery-platform-release.bundle "$REMOTE_BUNDLE"
          mv -f /tmp/deploy-git.sh "$REMOTE_SCRIPT"
          chmod 600 "$REMOTE_BUNDLE"
          chmod 700 "$REMOTE_SCRIPT"

          if [ -n "$(git -C "$APP_DIR" status --porcelain --untracked-files=normal)" ]; then
            echo "::error::the server worktree contains tracked or untracked source changes; refusing to import a release" >&2
            exit 1
          fi
          if [ ! -s "$APP_DIR/.deploy/last_successful_rev" ]; then
            current_revision="$(git -C "$APP_DIR" rev-parse --verify HEAD 2>/dev/null || true)"
            if [ -n "$current_revision" ]; then
              printf '%s\n' "$current_revision" > "$APP_DIR/.deploy/last_successful_rev.tmp"
              mv -f "$APP_DIR/.deploy/last_successful_rev.tmp" "$APP_DIR/.deploy/last_successful_rev"
            fi
          fi

          git -C "$APP_DIR" fetch "$REMOTE_BUNDLE" HEAD
          fetched_ref="$(git -C "$APP_DIR" rev-parse FETCH_HEAD)"
          test "$fetched_ref" = "$DEPLOY_REF"
          git -C "$APP_DIR" cat-file -e "${DEPLOY_REF}^{commit}"
          REMOTE

      - name: 执行 Git 拉取部署
        run: |
          local_env=""
          remote_env=""
          env_sha=""
          cleanup_local_env() {
            if [ -n "$local_env" ]; then
              rm -f "$local_env"
            fi
          }
          trap cleanup_local_env EXIT

          if [ -n "$SERVER_ENV_FILE_B64" ]; then
            local_env="$(mktemp)"
            printf '%s' "$SERVER_ENV_FILE_B64" | base64 -d > "$local_env"
            test -s "$local_env"
            chmod 600 "$local_env"
            env_sha="$(sha256sum "$local_env" | awk '{print $1}')"
            remote_env="$APP_DIR/.deploy/env-${DEPLOY_REF}.upload"
            scp -i ~/.ssh/deploy_key -P "$SERVER_PORT" \
              -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
              "$local_env" "$SERVER_USER@$SERVER_HOST:$remote_env"
          fi

          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
            -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "$SERVER_USER@$SERVER_HOST" 'bash -s' -- \
            "$APP_DIR" "$BRANCH" "$COMPOSE_FILES" "$DEPLOY_REF" "$remote_env" "$env_sha" \
            "/tmp/delivery-platform-deploy-${DEPLOY_REF}.sh" \
            "/tmp/delivery-platform-release-${DEPLOY_REF}.bundle" <<'REMOTE'
          set -Eeuo pipefail
          APP_DIR="$1"
          BRANCH="$2"
          COMPOSE_FILES="$3"
          DEPLOY_REF="$4"
          REMOTE_ENV="${5:-}"
          EXPECTED_ENV_SHA="${6:-}"
          DEPLOY_SCRIPT="$7"
          REMOTE_BUNDLE="$8"
          ENV_REPLACED="NO"
          umask 077

          restore_env_on_exit() {
            status="$?"
            trap - EXIT
            set +e
            if [ -n "$REMOTE_ENV" ]; then
              rm -f "$REMOTE_ENV"
            fi
            rm -f "$DEPLOY_SCRIPT" "$REMOTE_BUNDLE"
            if [ "$status" -ne 0 ] && [ "$ENV_REPLACED" = "YES" ]; then
              if [ -f "$APP_DIR/.deploy/env.before-deploy" ]; then
                mv -f "$APP_DIR/.deploy/env.before-deploy" "$APP_DIR/.env"
                rm -f "$APP_DIR/.deploy/env.was_absent"
              elif [ -f "$APP_DIR/.deploy/env.was_absent" ]; then
                rm -f "$APP_DIR/.env" "$APP_DIR/.deploy/env.was_absent"
              fi
            fi
            exit "$status"
          }
          trap restore_env_on_exit EXIT

          if [ -n "$REMOTE_ENV" ]; then
            chmod 600 "$REMOTE_ENV"
            actual_sha="$(sha256sum "$REMOTE_ENV" | awk '{print $1}')"
            test "$actual_sha" = "$EXPECTED_ENV_SHA"
            if [ -f "$APP_DIR/.env" ]; then
              cp -p "$APP_DIR/.env" "$APP_DIR/.deploy/env.before-deploy"
              chmod 600 "$APP_DIR/.deploy/env.before-deploy"
              rm -f "$APP_DIR/.deploy/env.was_absent"
            else
              rm -f "$APP_DIR/.deploy/env.before-deploy"
              install -m 600 /dev/null "$APP_DIR/.deploy/env.was_absent"
            fi
            mv -f "$REMOTE_ENV" "$APP_DIR/.env"
            ENV_REPLACED="YES"
          fi

          cd "$APP_DIR"
          export APP_DIR BRANCH COMPOSE_FILES
          export SKIP_GIT_FETCH=YES
          if [ -n "$DEPLOY_REF" ]; then
            export REF="$DEPLOY_REF"
          fi

          bash "$DEPLOY_SCRIPT" deploy
          bash "$DEPLOY_SCRIPT" status
          REMOTE
